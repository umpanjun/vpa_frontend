services:
  postgres:
    image: postgres:16-alpine
    container_name: vpa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vpa_construction
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d vpa_construction"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: vpa_backend
    env_file:
      - ./Backend/.env
    volumes:
      - ./Backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    expose:
      - "3000"

  frontend:
    build:
      context: ./web-app
      dockerfile: Dockerfile
    container_name: vpa_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
